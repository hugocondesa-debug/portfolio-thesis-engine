# Damodaran synthetic credit rating table — 2025 snapshot.
#
# Source: https://pages.stern.nyu.edu/~adamodar/New_Home_Page/datafile/ratings.html
# Applied by interest-coverage ratio for large/established companies.
# Spread is additive on top of the risk-free rate to get pretax cost of debt.
# Last refreshed manually: 2026-01

vintage: "2025-01"
applicability: "large_established"  # Alternative table exists for smaller cos

# Ordered from highest to lowest coverage (search high → low).
# ``min_coverage`` is inclusive lower bound; inf means no upper bound.
brackets:
  - rating: "AAA"
    min_coverage: 12.5
    spread: 0.0063
  - rating: "AA"
    min_coverage: 9.5
    spread: 0.0078
