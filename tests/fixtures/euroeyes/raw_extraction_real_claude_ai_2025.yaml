    2024 or 2023. Revenue recognised under IFRS 15. Vision correction services is the dominant category
    (99.3% FY2024 / 99.1% FY2023 of total revenue); Training, Pharmaceutical products, and Rental are
    ancillary. Training services concentration shifted: primarily UK (LVC) in both periods, with a small
    German component (HK$1,486) in FY2023 that did not recur in FY2024. Intra-group revenue (inter-segment)
    concentrated in Others/Germany (transfer of services to non-Germany entities); HK$10,800 FY2024 /
    HK$5,289 FY2023. Source cross-reference caveat: Note 6(b) Germany (external customers) reports HK$385,195
    FY2024 / HK$380,916 FY2023 vs sum of 6(c) external columns (Vis.Corr + Train + Others, Germany): HK$385,196
    FY2024 (+1 HK$''000 rounding) and HK$380,873 FY2023 (−43 HK$''000, reflecting partial re-classification
